  <title>Giraffe Grazing Tree Preview</title>

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #12161f;
      color: #e7edf7;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 20px;
    }
    .wrap {
      width: min(980px, 100%);
      background: #1a2030;
      border: 1px solid #2b3750;
      border-radius: 12px;
      padding: 18px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    a { color: #8fc4ff; }
    .stage {
      border: 1px solid #2b3750;
      border-radius: 10px;
      padding: 12px;
      background: #0f1624;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #2e3c58;
      border-radius: 8px;
      background: linear-gradient(#0f1e3a, #14274b 45%, #3f6d39 45%, #3f6d39);
    }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, button {
      background: #101827;
      color: #e7edf7;
      border: 1px solid #334563;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.95rem;

      for (let r = 19; r <= 24; r++) {
        m[r - 1][6] = m[r][6];
        m[r - 1][7] = m[r][7];
      }
      setPx(m, 24, 6, 0);
      setPx(m, 24, 7, 0);
      setPx(m, 19, 8, 1);
      setPx(m, 24, 23, 0);
      return m;
    }

    function makeGraze(headBob = 0) {
      const m = clone(giraffe);
      for (let r = 0; r < 12; r++) {
        for (let c = 15; c < 23; c++) {
          setPx(m, r, c, 0);
        }
      }
      for (let r = 0; r < 12; r++) {
        for (let c = 15; c < 23; c++) {
          const v = giraffe[r][c];
          if (!v) continue;
          setPx(m, r + 2 + headBob, c + 1, v);
        }
      }
      return m;
    }

    const grazeFrames = [makeGraze(0), makeGraze(1)];
    const walkFrames = [makeWalkA(), makeWalkB()];

    const palette = {
      giraffe: {1: '#E2B24A', 2: '#8A4E1F'},
      tree: {1: '#6C4A2D', 2: '#5A9E46'}
    };
    const treePaletteLevel2 = {1: '#6C4A2D', 2: '#2E7628'};

    function buildLevel2Tree(baseTree) {
      const rows = 30;
      const cols = 31;
      const out = Array.from({ length: rows }, () => Array(cols).fill(0));

      // Scale up canopy/branches from the base stage matrix.
      for (let r = 0; r < baseTree.length; r++) {
        for (let c = 0; c < baseTree[0].length; c++) {
          const v = baseTree[r][c];
          if (!v) continue;
          const nr = Math.min(rows - 1, Math.round(r * 1.2));
          const nc = Math.min(cols - 1, Math.round(c * 1.2) + 2);
          out[nr][nc] = v;
          if (v === 2 && r < 6 && nc + 1 < cols) out[nr][nc + 1] = 2;
        }
      }

      // Ensure coherent trunk/branch silhouette for all stages.
      for (let r = 13; r < rows; r++) {
        out[r][14] = 1;
        out[r][15] = 1;
        out[r][16] = 1;
      }
      out[13][13] = 1; out[14][12] = 1; out[15][11] = 1;
      out[13][17] = 1; out[14][18] = 1; out[15][19] = 1;
      out[12][15] = 1; out[11][15] = 1; out[10][15] = 1;
      return out;
    }

    const mirrorX = (matrix) => matrix.map((row) => [...row].reverse());
    const treeVariantsMirrored = {
      full: mirrorX(treeFull),
      grazed: mirrorX(tree75),
      half: mirrorX(tree50),
      quarter: mirrorX(tree25),
      depleted: mirrorX(tree0)
    };
    const treeLevel2VariantsMirrored = {
      full: mirrorX(buildLevel2Tree(treeFull)),
      grazed: mirrorX(buildLevel2Tree(tree75)),
      half: mirrorX(buildLevel2Tree(tree50)),
      quarter: mirrorX(buildLevel2Tree(tree25)),
      depleted: mirrorX(buildLevel2Tree(tree0))
    };

    let playing = true;
    let frame = 0;
    let last = 0;
    let treeOffset = 0;
    let movementMode = 'graze'; // graze | right | left
    const treeStageById = new Map(); // k -> 0(full),1(75),2(50),3(25),4(0)
    const isLevel2TreeIndex = (k) => ((k % 4) + 4) % 4 === 3;

    function drawMatrix(matrix, xOff, yOff, scale, colors) {
      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
          const v = matrix[r][c];
          if (!v) continue;
          ctx.fillStyle = colors[v];
          ctx.fillRect((xOff + c) * scale, (yOff + r) * scale, scale, scale);
        }
      }
    }

    function baseTreeStage() {
      const state = treeStateInput.value;
      if (state === 'grazed') return 1;
      if (state === 'half') return 2;
      if (state === 'quarter') return 3;
      if (state === 'depleted') return 4;
      return 0;
    }

    function treeForStage(stage) {
      if (stage === 1) return treeVariantsMirrored.grazed;
      if (stage === 2) return treeVariantsMirrored.half;
      if (stage === 3) return treeVariantsMirrored.quarter;
      if (stage >= 4) return treeVariantsMirrored.depleted;
      return treeVariantsMirrored.full;
    }

    function treeLevel2ForStage(stage) {
      if (stage === 1) return treeLevel2VariantsMirrored.grazed;
      if (stage === 2) return treeLevel2VariantsMirrored.half;
      if (stage === 3) return treeLevel2VariantsMirrored.quarter;
      if (stage >= 4) return treeLevel2VariantsMirrored.depleted;
      return treeLevel2VariantsMirrored.full;
    }

    function drawMatrixTransformed(matrix, xOff, yOff, scale, colors, flipHorizontal = false) {
      const width = matrix[0].length * scale;
      const height = matrix.length * scale;
      const px = xOff * scale;
      const py = yOff * scale;

      if (!flipHorizontal) {
        drawMatrix(matrix, xOff, yOff, scale, colors);
        return;
      }

      ctx.save();
      // Keep the sprite upright while facing left.
      ctx.translate(px + width, py);
      ctx.scale(-1, 1);

      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
          const v = matrix[r][c];
          if (!v) continue;
          ctx.fillStyle = colors[v];
          ctx.fillRect(c * scale, r * scale, scale, scale);
        }
      }
      ctx.restore();
    }

    function render(ts) {
      const scale = Math.max(1, Math.min(18, Number(scaleInput.value) || 5));
      const fps = Math.max(1, Math.min(12, Number(fpsInput.value) || 4));
      const frameTime = 1000 / fps;
      const moving = movementMode === 'right' || movementMode === 'left';
      const activeFrames = moving ? walkFrames : grazeFrames;
      const baseStage = baseTreeStage();

      if (playing && ts - last >= frameTime) {
        frame = (frame + 1) % activeFrames.length;
        last = ts;
      }

      const cols = 70;
      const rows = 40;
      const treeY = 14;
      scene.width = cols * scale;
      scene.height = rows * scale;
      ctx.clearRect(0, 0, scene.width, scene.height);

      if (playing && movementMode === 'right') {
        treeOffset -= 0.2;
      } else if (playing && movementMode === 'left') {
        treeOffset += 0.2;
      }

      const tilePeriod = treeVariantsMirrored.full[0].length;
      const baseTreeX = 42 + treeOffset;
      const kStart = Math.floor((-(tilePeriod) - baseTreeX) / tilePeriod);
      const kEnd = Math.ceil((cols + tilePeriod - baseTreeX) / tilePeriod);
      for (let k = kStart; k <= kEnd; k++) {
        const stage = treeStageById.has(k) ? treeStageById.get(k) : baseStage;
        if (isLevel2TreeIndex(k)) {
          const tree = treeLevel2ForStage(stage);
          drawMatrix(tree, baseTreeX + k * tilePeriod - 3, treeY - 10, scale, treePaletteLevel2);
        } else {
          const tree = treeForStage(stage);
          drawMatrix(tree, baseTreeX + k * tilePeriod, treeY, scale, palette.tree);
        }
      }

      drawMatrixTransformed(activeFrames[frame], 10, 12, scale, palette.giraffe, movementMode === 'left');

      requestAnimationFrame(render);
    }

    toggle.addEventListener('click', () => {
      playing = !playing;
      toggle.textContent = playing ? 'Pause' : 'Play';
    });

    walkRightBtn.addEventListener('click', () => {
      movementMode = movementMode === 'right' ? 'graze' : 'right';
      walkRightBtn.textContent = movementMode === 'right' ? 'Stop Right' : 'Walk Right';
      walkLeftBtn.textContent = 'Walk Left';
      frame = 0;
    });

    walkLeftBtn.addEventListener('click', () => {
      movementMode = movementMode === 'left' ? 'graze' : 'left';
      walkLeftBtn.textContent = movementMode === 'left' ? 'Stop Left' : 'Walk Left';
      walkRightBtn.textContent = 'Walk Right';
      frame = 0;
    });

    scene.addEventListener('click', (event) => {
      const scale = Math.max(1, Math.min(18, Number(scaleInput.value) || 5));
      const rect = scene.getBoundingClientRect();
      const xTile = (event.clientX - rect.left) / scale;
      const yTile = (event.clientY - rect.top) / scale;

      const tilePeriod = treeVariantsMirrored.full[0].length;
      const baseTreeX = 42 + treeOffset;
      const treeY = 14;
      const k = Math.floor((xTile - baseTreeX) / tilePeriod);
      const isLevel2 = isLevel2TreeIndex(k);
      const treeX = baseTreeX + k * tilePeriod + (isLevel2 ? -3 : 0);
      const effectiveTreeY = treeY + (isLevel2 ? -10 : 0);
      const localX = Math.floor(xTile - treeX);
      const localY = Math.floor(yTile - effectiveTreeY);

      const baseStage = baseTreeStage();
      const currentStage = treeStageById.has(k) ? treeStageById.get(k) : baseStage;
      const currentTree = isLevel2 ? treeLevel2ForStage(currentStage) : treeForStage(currentStage);

      if (localX < 0 || localX >= currentTree[0].length || localY < 0 || localY >= currentTree.length) return;

      // Only green foliage tiles (value 2) are clickable.
      if (currentTree[localY][localX] !== 2) return;

      const nextStage = Math.min(4, currentStage + 1);
      treeStageById.set(k, nextStage);
    });

    requestAnimationFrame(render);
  </script>
</body>
</html>
