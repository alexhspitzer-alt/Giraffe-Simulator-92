<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Giraffe Sprite Preview</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #1a1f29;
      --text: #e9edf5;
      --muted: #9aa7bd;
      --accent: #67b3ff;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .wrap {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid #2a3242;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .stage {
      background: #0f131b;
      border: 1px solid #263044;
      border-radius: 10px;
      padding: 16px;
      display: grid;
      place-items: center;
      margin-bottom: 14px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: repeating-linear-gradient(
        45deg,
        #0f1520,
        #0f1520 12px,
        #121b2a 12px,
        #121b2a 24px
      );
      border: 1px solid #2c3952;
      border-radius: 8px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    label {
      font-size: 0.9rem;
      color: var(--muted);
    }
    select, button, input {
      background: #101722;
      color: var(--text);
      border: 1px solid #31405a;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    .meta {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>

    <p><a href="./graze_tree.html">Open scene: giraffe grazing on acacia tree →</a></p>

      setPx(m, 24, 7, 0);

        }

          const v = base[r][c];
          if (!v) continue;
          setPx(m, r + neckDrop + headBob, c + neckForward, v);
        }
      }

      return m;
    }

    function drawFrame(frame, scale) {
      const rows = frame.length;
      const cols = frame[0].length;
      canvas.width = cols * scale;
      canvas.height = rows * scale;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const v = frame[r][c];
          if (!v) continue;
          ctx.fillStyle = palette[v] || '#ffffff';
          ctx.fillRect(c * scale, r * scale, scale, scale);
        }
      }
    }

    function drawTreeScene(giraffeFrame, scale, treeMatrix) {
      const sceneCols = 70;
      const sceneRows = 40;
      canvas.width = sceneCols * scale;
      canvas.height = sceneRows * scale;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const drawLayer = (matrix, xOff, yOff, colors) => {
        for (let r = 0; r < matrix.length; r++) {
          for (let c = 0; c < matrix[0].length; c++) {
            const v = matrix[r][c];
            if (!v) continue;
            ctx.fillStyle = colors[v];
            ctx.fillRect((xOff + c) * scale, (yOff + r) * scale, scale, scale);
          }
        }
      };

      const tilePeriod = treeMatrix[0].length;
      for (let x = 38; x < sceneCols + tilePeriod; x += tilePeriod) {
        drawLayer(treeMatrix, x, 14, treePalette);
      }
      drawLayer(giraffeFrame, 10, 12, palette);
    }

    function tick(ts) {
      const mode = animSel.value;
      const frames = mode === 'tree' ? animations.graze : animations[mode];
      const treeMatrix = treeVariantsMirrored[treeStateInput.value] || treeVariantsMirrored.full;
      const scale = Math.max(1, Math.min(24, Number(scaleInput.value) || 5));
      const fps = Math.max(1, Math.min(12, Number(fpsInput.value) || 4));
      const frameTime = 1000 / fps;

      if (playing && ts - last >= frameTime) {
        frameIdx = (frameIdx + 1) % frames.length;
        last = ts;
      }

      if (mode === 'tree') {
        drawTreeScene(frames[frameIdx], scale, treeMatrix);
      } else {
        drawFrame(frames[frameIdx], scale);
      }
      meta.textContent = `Animation: ${mode} | Frame: ${frameIdx + 1}/${frames.length} | Scale: ${scale}x | FPS: ${fps}`;
      requestAnimationFrame(tick);
    }

    animSel.addEventListener('change', () => { frameIdx = 0; });
    scaleInput.addEventListener('change', () => { frameIdx = 0; });
    fpsInput.addEventListener('change', () => { frameIdx = 0; });

    toggleBtn.addEventListener('click', () => {
      playing = !playing;
      toggleBtn.textContent = playing ? 'Pause' : 'Play';
    });

    stepBtn.addEventListener('click', () => {
      const frames = animSel.value === 'tree' ? animations.graze : animations[animSel.value];
      const treeMatrix = treeVariantsMirrored[treeStateInput.value] || treeVariantsMirrored.full;
      frameIdx = (frameIdx + 1) % frames.length;
      if (animSel.value === 'tree') {
        drawTreeScene(frames[frameIdx], Number(scaleInput.value) || 5, treeMatrix);
      } else {
        drawFrame(frames[frameIdx], Number(scaleInput.value) || 5);
      }
    });

    drawFrame(base, 5);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
