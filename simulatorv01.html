<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giraffe Simulator v01</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #12161f;
      color: #e7edf7;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 20px;
    }
    .wrap {
      width: min(980px, 100%);
      background: #1a2030;
      border: 1px solid #2b3750;
      border-radius: 12px;
      padding: 18px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    a { color: #8fc4ff; }
    .stage {
      border: 1px solid #2b3750;
      border-radius: 10px;
      padding: 12px;
      background: #0f1624;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #2e3c58;
      border-radius: 8px;
      background: linear-gradient(#0f1e3a, #14274b 66%, #3f6d39 66%, #3f6d39);
    }
    .controls { display: flex; gap: 60px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .frame {
      border: 1px solid #2b3750;
      border-radius: 10px;
      background: #111827;
      padding: 12px;
      margin-bottom: 12px;
    }
    .frame h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }
    .upgrades {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .upgrade-card {
      border: 1px solid #3b4f73;
      border-radius: 8px;
      background: #0b1320;
      color: #e7edf7;
      padding: 10px;
      min-width: 180px;
      cursor: pointer;
      text-align: left;
    }
    .upgrade-card.selected {
      border-color: #8fc4ff;
      box-shadow: 0 0 0 1px #8fc4ff inset;
    }
    .upgrade-card .title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .upgrade-card .desc {
      color: #b9c7df;
      font-size: 0.9rem;
    }
    .hidden { display: none; }
    .rumen-progress {
      width: 100%;
      height: 18px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 1px solid #3b4f73;
      border-radius: 999px;
      overflow: hidden;
    }
    .rumen-progress::-webkit-progress-bar { background: transparent; }
    .rumen-progress::-webkit-progress-value {
      background: #4CAF50;
      transition: background-color 180ms ease;
    }
    .rumen-progress::-moz-progress-bar {
      background: #4CAF50;
      transition: background-color 180ms ease;
    }
    .rumen-progress.gold::-webkit-progress-value { background: #D9AE3B; }
    .rumen-progress.gold::-moz-progress-bar { background: #D9AE3B; }
    .rumen-title {
      margin: 8px 0 0;
      text-align: center;
    }

    input, button {
      background: #101827;
      color: #e7edf7;
      border: 1px solid #334563;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>Giraffe Simulator v01</h1>
      <a href="./index.html">← Back to sprite preview</a>
    </div>

    <section class="stage">
      <canvas id="scene" width="700" height="500"></canvas>
    </section>
    <section id="levelFrame" class="frame hidden" aria-label="Level up upgrades">
      <h2 id="levelTitle">Level Up</h2>
      <div id="upgradeCards" class="upgrades"></div>
      <button id="continueBtn">Continue</button>
    </section>

    <section id="rumenFrame" class="frame" aria-label="Rumen progression">
      <progress id="treeProgress" class="rumen-progress" max="50" value="0"></progress>
      <div id="treeProgressLabel" style="margin-top: 6px; color: #b9c7df; font-size: 0.9rem; text-align: center;">0 / 50 L</div>
      <h2 class="rumen-title">Rumen</h2>
      <div id="rumenHint" style="margin-top: 4px; color: #8fc4ff; font-size: 0.85rem; text-align: center;">Fill to 30L to activate Turbo</div>
    </section>

    <section class="controls" aria-label="Simulator controls">
      <button id="walkLeft">Left</button>
      <button id="toggle">Pause</button>
      <button id="walkRight">Right</button>
    </section>
  </main>

    function applyNeckBoost(matrix, neckLevel) {

      }
      for (let r = headTop; r <= headBottom; r++) {

      for (let r = headTop; r <= headBottom; r++) {

          if (v) setPx(m, r, c, v);
        }
      }
      const neckStart = headBottom;
      const neckEnd = neckBottom + extraRows;
      const neckCols = [];
      for (let c = 15; c < 23; c++) if (m[headBottom][c] !== 0) neckCols.push(c);
      for (const col of neckCols) {
        for (let r = neckStart; r <= neckEnd; r++) {
          if (m[r][col] === 0) setPx(m, r, col, 1);
        }
      }
      return { matrix: m, yAdjust: -extraRows };
    }

    function buildLevel2TreeBase() {
      const rows = 30;
      const cols = 31;
      const out = Array.from({ length: rows }, () => Array(cols).fill(0));

      // Coherent level-2 canopy shape.
      for (let r = 0; r <= 2; r++) for (let c = 7; c <= 23; c++) out[r][c] = 2;
      for (let r = 3; r <= 7; r++) for (let c = 4; c <= 26; c++) out[r][c] = 2;
      for (let r = 8; r <= 11; r++) for (let c = 3; c <= 27; c++) out[r][c] = 2;
      for (let c = 6; c <= 24; c++) out[12][c] = 2;

      // Trunk and three branches.
      for (let r = 13; r < rows; r++) {
        out[r][14] = 1;
        out[r][15] = 1;
        out[r][16] = 1;
      }
      out[13][13] = 1; out[14][12] = 1; out[15][11] = 1;
      out[13][17] = 1; out[14][18] = 1; out[15][19] = 1;
      out[12][15] = 1; out[11][15] = 1; out[10][15] = 1;
      return out;
    }

    function buildLevel2Stage(level2Base, stageIndex) {
      const out = cloneMatrix(level2Base);
      const eatProfile = [0.0, 0.22, 0.46, 0.68, 1.0];
      const eatBase = eatProfile[Math.max(0, Math.min(4, stageIndex))];

      for (let r = 0; r <= 12; r++) {
        let left = -1;
        let right = -1;
        for (let c = 0; c < out[0].length; c++) {
          if (out[r][c] === 2) {
            if (left === -1) left = c;
            right = c;
          }
        }
        if (left === -1) continue;

        const span = right - left + 1;
        const uneven = (((r * 3) % 5) - 2) * 0.03; // slight per-row variation
        const eatFrac = Math.max(0, Math.min(1, eatBase + uneven));
        const cut = Math.floor(span * eatFrac);
        const cutLeft = Math.max(left, right - cut);

        // Primary grazing direction: right -> left in base matrix
        // (final rendered orientation is mirrored).
        for (let c = cutLeft; c <= right; c++) {
          if (out[r][c] === 2) out[r][c] = 0;
        }

        // Irregular bite marks for less uniform silhouettes.
        if (stageIndex >= 2) {
          for (let c = Math.max(left, cutLeft - 6); c < cutLeft; c++) {
            if ((r + c) % 3 === 0 && out[r][c] === 2) out[r][c] = 0;
          }
        }
        if (stageIndex >= 3) {
          for (let c = Math.max(left, cutLeft - 10); c < cutLeft - 1; c++) {
            if ((r * 2 + c) % 4 === 0 && out[r][c] === 2) out[r][c] = 0;
          }
        }
        if (stageIndex >= 4) {
          for (let c = left; c <= right; c++) {
            if (out[r][c] === 2) out[r][c] = 0;
          }
        }
      }

      // Reveal additional branch pixels as foliage gets eaten.
      if (stageIndex >= 1) { out[12][11] = 1; out[11][10] = 1; }
      if (stageIndex >= 2) { out[13][12] = 1; out[10][9] = 1; }
      if (stageIndex >= 3) { out[14][11] = 1; out[9][8] = 1; }

      return out;
    }

    function buildLevel3TreeBase() {
      const rows = 36;
      const cols = 33;
      const out = Array.from({ length: rows }, () => Array(cols).fill(0));

      // A taller, level-1-like acacia canopy with graduated green bands.
      for (let c = 7; c <= 25; c++) out[0][c] = 4;
      for (let r = 1; r <= 3; r++) for (let c = 5; c <= 27; c++) out[r][c] = 4;
      for (let r = 4; r <= 8; r++) for (let c = 3; c <= 29; c++) out[r][c] = 3;
      for (let r = 9; r <= 12; r++) for (let c = 4; c <= 28; c++) out[r][c] = 2;
      for (let c = 8; c <= 24; c++) out[13][c] = 2;

      // Taller trunk.
      for (let r = 14; r < rows; r++) {
        out[r][15] = 1;
        out[r][16] = 1;
        out[r][17] = 1;
      }

      // More exposed branches than level 2.
      out[13][14] = 1; out[12][13] = 1; out[11][12] = 1; out[10][11] = 1;
      out[13][18] = 1; out[12][19] = 1; out[11][20] = 1; out[10][21] = 1;
      out[15][14] = 1; out[16][13] = 1; out[17][12] = 1;
      out[15][18] = 1; out[16][19] = 1; out[17][20] = 1;
      out[14][16] = 1; out[13][16] = 1; out[12][16] = 1; out[11][16] = 1;

      return out;
    }

    function isLeafValue(v) {
      return v >= 2;
    }

    function degradeLeaf(v) {
      if (v === 4) return 3;
      if (v === 3) return 2;
      return 0;
    }

    function buildLevel3Stage(level3Base, stageIndex) {
      const out = cloneMatrix(level3Base);
      const eatProfile = [0.0, 0.2, 0.42, 0.66, 1.0];
      const eatBase = eatProfile[Math.max(0, Math.min(4, stageIndex))];

      for (let r = 0; r <= 13; r++) {
        let left = -1;
        let right = -1;
        for (let c = 0; c < out[0].length; c++) {
          if (isLeafValue(out[r][c])) {
            if (left === -1) left = c;
            right = c;
          }
        }
        if (left === -1) continue;

        const span = right - left + 1;
        const uneven = (((r * 5) % 7) - 3) * 0.02;
        const eatFrac = Math.max(0, Math.min(1, eatBase + uneven));
        const cut = Math.floor(span * eatFrac);
        const cutLeft = Math.max(left, right - cut);

        for (let c = cutLeft; c <= right; c++) {
          if (!isLeafValue(out[r][c])) continue;
          out[r][c] = degradeLeaf(out[r][c]);
          if (stageIndex >= 2) out[r][c] = degradeLeaf(out[r][c]);
          if (stageIndex >= 4) out[r][c] = 0;
        }

        if (stageIndex >= 2) {
          for (let c = Math.max(left, cutLeft - 8); c < cutLeft; c++) {
            if ((r + c) % 4 === 0 && isLeafValue(out[r][c])) out[r][c] = degradeLeaf(out[r][c]);
          }
        }
        if (stageIndex >= 3) {
          for (let c = left; c <= Math.max(left, cutLeft - 3); c++) {
            if ((r * 3 + c) % 5 === 0 && isLeafValue(out[r][c])) out[r][c] = 0;
          }
        }
        if (stageIndex >= 4) {
          for (let c = left; c <= right; c++) {
            if (isLeafValue(out[r][c])) out[r][c] = 0;
          }
        }
      }

      if (stageIndex >= 1) { out[12][12] = 1; out[12][20] = 1; }
      if (stageIndex >= 2) { out[11][11] = 1; out[11][21] = 1; out[10][16] = 1; }
      if (stageIndex >= 3) { out[10][10] = 1; out[10][22] = 1; out[9][16] = 1; }

      return out;
    }

    function drawClouds(cols, scale) {

      const kStart = Math.floor((-(cloudTilePeriod) - baseCloudX) / cloudTilePeriod);
      const kEnd = Math.ceil((cols + cloudTilePeriod - baseCloudX) / cloudTilePeriod);
      const cloudRows = [2, 5, 8];

      ctx.save();

    function rustleOffsetForTree(k, nowTs) {

    function drawTreeWithRustle(matrix, xOff, yOff, scale, colors, rustleX) {

    function baseTreeStage() {

      if (state === 'grazed') return 1;
      if (state === 'half') return 2;
      if (state === 'quarter') return 3;
      if (state === 'depleted') return 4;
      return 0;
    }

    function treeForStage(stage) {
      if (stage === 1) return treeVariantsMirrored.grazed;
      if (stage === 2) return treeVariantsMirrored.half;
      if (stage === 3) return treeVariantsMirrored.quarter;
      if (stage >= 4) return treeVariantsMirrored.depleted;
      return treeVariantsMirrored.full;
    }

    function treeLevel2ForStage(stage) {
      if (stage === 1) return treeLevel2VariantsMirrored.grazed;
      if (stage === 2) return treeLevel2VariantsMirrored.half;
      if (stage === 3) return treeLevel2VariantsMirrored.quarter;
      if (stage >= 4) return treeLevel2VariantsMirrored.depleted;
      return treeLevel2VariantsMirrored.full;
    }

    function treeLevel3ForStage(stage) {
      if (stage === 1) return treeLevel3VariantsMirrored.grazed;
      if (stage === 2) return treeLevel3VariantsMirrored.half;
      if (stage === 3) return treeLevel3VariantsMirrored.quarter;
      if (stage >= 4) return treeLevel3VariantsMirrored.depleted;
      return treeLevel3VariantsMirrored.full;
    }

    function drawMatrixTransformed(matrix, xOff, yOff, scale, colors, flipHorizontal = false) {
      const width = matrix[0].length * scale;
      const height = matrix.length * scale;
      const px = xOff * scale;
      const py = yOff * scale;

      if (!flipHorizontal) {
        drawMatrix(matrix, xOff, yOff, scale, colors);
        return;
      }

      ctx.save();
      // Keep the sprite upright while facing left.
      ctx.translate(px + width, py);
      ctx.scale(-1, 1);

      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
          const v = matrix[r][c];
          if (!v) continue;
          ctx.fillStyle = colors[v];
          ctx.fillRect(c * scale, r * scale, scale, scale);
        }
      }
      ctx.restore();
    }

    function render(ts) {
      const scale = Math.max(1, Math.min(18, SIM_SCALE));
      const fps = isTurboActive(ts) ? TURBO_FPS : Math.max(1, Math.min(12, SIM_FPS));
      const frameTime = 1000 / fps;
      const moving = movementMode === 'right' || movementMode === 'left';
      const activeFrames = moving ? walkFrames : grazeFrames;
      const baseStage = baseTreeStage();
      const turboActiveNow = isTurboActive(ts);
      if (turboActiveNow !== turboWasActive) {
        turboWasActive = turboActiveNow;
        syncTreeProgressUi();
      }

      if (playing && ts - last >= frameTime) {
        frame = (frame + 1) % activeFrames.length;
        last = ts;
      }

      // Apply any delayed stage advancements after rustle completes.
      for (const [k, pending] of pendingAdvanceById.entries()) {
        if (!playing) continue;
        if (ts < pending.at) continue;
        treeStageById.set(k, pending.nextStage);
        if (pending.nextStage > pending.prevStage) advanceTreeProgress();
        if (pending.nextStage === 4 && pending.prevStage < 4) {
          if (pending.tier === 1) xp += 10;
          else if (pending.tier === 2) xp += 50;
          else if (pending.tier === 3) xp += 500;
          if (!levelUpPending && xp >= nextLevelXp(level)) {
            openLevelUpFrame();
          }
        }
        pendingAdvanceById.delete(k);
      }

      const cols = 70;
      const rows = 54;
      const treeY = 24;
      scene.width = cols * scale;
      scene.height = rows * scale;
      ctx.clearRect(0, 0, scene.width, scene.height);

      const moveStep = movementSpeedPerFrame();
      if (playing && movementMode === 'right') {
        treeOffset -= moveStep;
      } else if (playing && movementMode === 'left') {
        treeOffset += moveStep;
      }

      const tilePeriod = treeVariantsMirrored.full[0].length;
      const baseTreeX = 42 + treeOffset;
      drawClouds(cols, scale);
      const kStart = Math.floor((-(tilePeriod) - baseTreeX) / tilePeriod);
      const kEnd = Math.ceil((cols + tilePeriod - baseTreeX) / tilePeriod);
      for (let k = kStart; k <= kEnd; k++) {
        const stage = treeStageById.has(k) ? treeStageById.get(k) : baseStage;
        const tier = treeTierAtIndex(k);
        const rustleX = rustleOffsetForTree(k, ts);
        if (tier === 3) {
          const tree = treeLevel3ForStage(stage);
          drawTreeWithRustle(tree, baseTreeX + k * tilePeriod - 4, treeY - 16, scale, treePaletteLevel3, rustleX);
        } else if (tier === 2) {
          const tree = treeLevel2ForStage(stage);
          drawTreeWithRustle(tree, baseTreeX + k * tilePeriod - 3, treeY - 10, scale, treePaletteLevel2, rustleX);
        } else {
          const tree = treeForStage(stage);
          drawTreeWithRustle(tree, baseTreeX + k * tilePeriod, treeY, scale, palette.tree, rustleX);
        }
      }
      drawXpHud();

      const neckLevel = playerUpgradeLevels['long-horse'] || 0;
      const neckAdjusted = applyNeckBoost(activeFrames[frame], neckLevel);
      drawMatrixTransformed(neckAdjusted.matrix, 10, 20 + neckAdjusted.yAdjust, scale, palette.giraffe, movementMode === 'left');
      drawChompFx(ts);

      requestAnimationFrame(render);
    }

    toggle.addEventListener('click', () => {
      playing = !playing;
      toggle.textContent = playing ? 'Pause' : 'Play';
    });

    walkRightBtn.addEventListener('click', () => {
      movementMode = movementMode === 'right' ? 'graze' : 'right';
      walkRightBtn.textContent = movementMode === 'right' ? 'Stop' : 'Right';
      walkLeftBtn.textContent = 'Left';
      frame = 0;
    });

    walkLeftBtn.addEventListener('click', () => {
      movementMode = movementMode === 'left' ? 'graze' : 'left';
      walkLeftBtn.textContent = movementMode === 'left' ? 'Stop' : 'Left';
      walkRightBtn.textContent = 'Right';
      frame = 0;
    });

    scene.addEventListener('click', (event) => {
      if (!playing) return;
      if (levelUpPending) return;
      const scale = Math.max(1, Math.min(18, SIM_SCALE));
      const rect = scene.getBoundingClientRect();
      const xTile = (event.clientX - rect.left) / scale;
      const yTile = (event.clientY - rect.top) / scale;

      const tilePeriod = treeVariantsMirrored.full[0].length;
      const baseTreeX = 42 + treeOffset;
      const treeY = 24;
      const k = Math.floor((xTile - baseTreeX) / tilePeriod);
      const tier = treeTierAtIndex(k);
      const treeX = baseTreeX + k * tilePeriod + (tier === 3 ? -4 : tier === 2 ? -3 : 0);
      const effectiveTreeY = treeY + (tier === 3 ? -16 : tier === 2 ? -10 : 0);
      const localX = Math.floor(xTile - treeX);
      const localY = Math.floor(yTile - effectiveTreeY);

      const baseStage = baseTreeStage();
      const currentStage = treeStageById.has(k) ? treeStageById.get(k) : baseStage;
      const currentTree =
        tier === 3 ? treeLevel3ForStage(currentStage) :
        tier === 2 ? treeLevel2ForStage(currentStage) :
        treeForStage(currentStage);

      if (localX < 0 || localX >= currentTree[0].length || localY < 0 || localY >= currentTree.length) return;

      // Green foliage tiles are primary click targets.
      // For sparse stages, allow clicks anywhere inside the remaining canopy bounds.
      let minX = Infinity;
      let maxX = -1;
      let minY = Infinity;
      let maxY = -1;
      for (let r = 0; r < currentTree.length; r++) {
        for (let c = 0; c < currentTree[0].length; c++) {
          if (isLeafValue(currentTree[r][c])) {
            minX = Math.min(minX, c);
            maxX = Math.max(maxX, c);
            minY = Math.min(minY, r);
            maxY = Math.max(maxY, r);
          }
        }
      }

      if (maxX === -1) return; // already depleted
      const hitLeaf = isLeafValue(currentTree[localY][localX]);
      const hitCanopyBounds =
        localX >= minX && localX <= maxX &&
        localY >= minY && localY <= maxY;
      if (!hitLeaf && !hitCanopyBounds) return;
      const neckLevel = playerUpgradeLevels['long-horse'] || 0;
      const neckRaiseTiles = neckLevel * 4;
      const giraffeMouthY = 22 - neckRaiseTiles;
      const canopyBottomY = effectiveTreeY + maxY;
      if (giraffeMouthY > canopyBottomY) return;
      const treeTrunkX = treeX + Math.floor(currentTree[0].length / 2);
      const giraffeFrontX = GIRAFFE_X + GIRAFFE_W - 1;
      const giraffeBackX = GIRAFFE_X;
      const giraffeMidX = Math.floor((giraffeFrontX + giraffeBackX) / 2);
      const trunkDistance = Math.abs(treeTrunkX - giraffeMidX);
      const treeInteractRange = isTurboActive() ? TURBO_TREE_RANGE_X : TREE_INTERACT_RANGE_X;
      if (trunkDistance > treeInteractRange) return;

      const hpKey = `${k}:${currentStage}`;
      const currentHp = treeStageHpById.has(hpKey) ? treeStageHpById.get(hpKey) : maxHpForStage(currentStage);
      const critLevel = playerUpgradeLevels['crits-r-us'] || 0;
      const critChance = Math.max(0, critLevel * 0.02);
      const turboCrit = isTurboActive();
      const critHit = turboCrit || Math.random() < critChance;
      const damage = Math.ceil(baseBiteDamage() * (critHit ? 3 : 1));
      const nextHp = currentHp - damage;
      if (critHit) {
        const now = performance.now();
        if (now - lastChompFxAt >= 500) {
          const neckLevel = playerUpgradeLevels['long-horse'] || 0;
          const neckRaise = neckLevel * 4;
          const headX = (GIRAFFE_X + 18) * scale;
          const headY = (20 - neckRaise + 2) * scale;
          chompFx = {
            at: now,
            until: now + 520,
            x: headX + 4 * scale,
            y: headY - 4 * scale
          };
          lastChompFxAt = now;
        }
      }
      const turboActive = isTurboActive();
      const rustleDurationMs = RUSTLE_MS;
      const advanceDelayMs = turboActive ? 0 : ADVANCE_DELAY_AFTER_RUSTLE_MS;
      const rustleUntil = performance.now() + rustleDurationMs;
      treeRustleUntilById.set(k, rustleUntil);
      if (nextHp > 0) {
        treeStageHpById.set(hpKey, nextHp);
        return;
      }

      treeStageHpById.set(hpKey, 0);
      const nextStage = Math.min(4, currentStage + 1);
      pendingAdvanceById.set(k, {
        at: rustleUntil + advanceDelayMs,
        nextStage,
        prevStage: currentStage,
        tier
      });
    });


    rumenFrame.addEventListener('click', () => {
      if (!playing) return;
      activateTurbo();
      syncTreeProgressUi();
    });

    continueBtn.addEventListener('click', () => {
      if (!selectedUpgradeId) return;
      if (selectedUpgradePathId) {
        const current = playerUpgradeLevels[selectedUpgradePathId] || 0;
        playerUpgradeLevels[selectedUpgradePathId] = current + 1;
      }
      level += 1;
      closeLevelUpFrame();
      if (xp >= nextLevelXp(level)) {
        openLevelUpFrame();
      }
    });

    applySkyFromSystemTime();
    syncTreeProgressUi();
    requestAnimationFrame(render);
  </script>
</body>
</html>
